<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Marketplace</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
}

.hero{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:60px 20px;
border-radius:20px;
}

.product-card{
transition:.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

.footer-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
z-index:999;
}

.footer-nav a{
text-decoration:none;
color:#666;
font-size:14px;
}

.footer-nav a.active{
color:#4f46e5;
}

</style>

</head>

<body>

<div class="container py-4">

<div class="hero text-center mb-4">

<h1>My Marketplace</h1>

<p>Buy & Sell Everything Online</p>

<button class="btn btn-light">
Start Shopping
</button>

</div>

<div class="row g-3 mb-4">

<div class="col-6 col-md-3">
<div class="card text-center">
<div class="card-body">
🛍️
<h6>Products</h6>
</div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="card text-center">
<div class="card-body">
📦
<h6>Orders</h6>
</div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="card text-center">
<div class="card-body">
💰
<h6>Wallet</h6>
</div>
</div>
</div>

<div class="col-6 col-md-3">
<div class="card text-center">
<div class="card-body">
👤
<h6>Profile</h6>
</div>
</div>
</div>

</div>

<h3 class="mb-3">Featured Products</h3>

<div class="row g-4">

<div class="col-6 col-md-4 col-lg-3">
<div class="card product-card">
<img src="https://picsum.photos/400/300"
class="card-img-top img-fluid">
<div class="card-body">
<h6>Smart Watch</h6>
<p>$99</p>
<button class="btn btn-primary w-100">
Buy Now
</button>
</div>
</div>
</div>

<div class="col-6 col-md-4 col-lg-3">
<div class="card product-card">
<img src="https://picsum.photos/401/300"
class="card-img-top img-fluid">
<div class="card-body">
<h6>Headphones</h6>
<p>$59</p>
<button class="btn btn-primary w-100">
Buy Now
</button>
</div>
</div>
</div>

<div class="col-6 col-md-4 col-lg-3">
<div class="card product-card">
<img src="https://picsum.photos/402/300"
class="card-img-top img-fluid">
<div class="card-body">
<h6>Phone</h6>
<p>$299</p>
<button class="btn btn-primary w-100">
Buy Now
</button>
</div>
</div>
</div>

<div class="col-6 col-md-4 col-lg-3">
<div class="card product-card">
<img src="https://picsum.photos/403/300"
class="card-img-top img-fluid">
<div class="card-body">
<h6>Laptop</h6>
<p>$699</p>
<button class="btn btn-primary w-100">
Buy Now
</button>
</div>
</div>
</div>

</div>

<br><br><br>

</div>

<div class="footer-nav">
<div class="container">
<div class="row text-center py-2">

<div class="col">
<a href="#" class="active">
🏠<br>
Home
</a>
</div>

<div class="col">
<a href="#">
🛒<br>
Products
</a>
</div>

<div class="col">
<a href="#">
📦<br>
Orders
</a>
</div>

<div class="col">
<a href="#">
💬<br>
Support
</a>
</div>

<div class="col">
<a href="#">
👤<br>
Profile
</a>
</div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
